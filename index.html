<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Orbit Flywheel Preview</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --terracotta: #E4007C;
      --navy: #3A3A3A;
      --cream-dark: #FFF9F0;
      --text-dark: #1F1F1F;
      --text-medium: #4A4A4A;
      --text-light: #7A7A7A;
      --white: #FFFFFF;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream-dark); color: var(--text-dark); padding: 60px 24px; line-height: 1.7; }
    h3 { font-family: 'Playfair Display', Georgia, serif; font-size: 1.4rem; color: var(--navy); margin-bottom: 8px; }
    .framework-card {
      max-width: 1000px; margin: 0 auto; background: var(--white);
      border-radius: 16px; padding: 48px;
      box-shadow: 0 4px 20px rgba(58, 58, 58, 0.06);
      border-left: 4px solid var(--terracotta);
    }
    .flywheel-interactive { display: grid; grid-template-columns: 1fr 1.2fr; gap: 56px; align-items: center; margin-top: 32px; }
    .flywheel-orbit-wrapper { position: relative; width: 100%; max-width: 320px; margin: 0 auto; aspect-ratio: 1; }
    .flywheel-orbit-svg { width: 100%; height: 100%; overflow: visible; }
    .flywheel-orbit { transition: transform 1.4s cubic-bezier(0.65, 0, 0.35, 1); transform-origin: 200px 200px; }
    .flywheel-dot-orbit { transition: r 0.8s ease, fill 0.8s ease; }
    .flywheel-guide-ring { fill: none; stroke: rgba(58, 58, 58, 0.12); stroke-width: 1; }
    .flywheel-center {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center;
      padding: 20% 15%; pointer-events: none;
    }
    .flywheel-center-label { font-size: 0.7rem; font-weight: 600; color: var(--terracotta); letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 10px; }
    .flywheel-center-name { font-family: 'Playfair Display', Georgia, serif; font-size: 2rem; font-weight: 700; color: var(--navy); line-height: 1.1; }
    .flywheel-center.fading .flywheel-center-label, .flywheel-center.fading .flywheel-center-name { animation: centerFade 0.8s ease; }
    @keyframes centerFade { 0% { opacity: 0; transform: translateY(6px); } 100% { opacity: 1; transform: translateY(0); } }
    .flywheel-phase-panel { min-height: 160px; display: flex; flex-direction: column; justify-content: center; }
    .flywheel-phase-eyebrow { font-size: 0.7rem; font-weight: 600; color: var(--text-light); letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 14px; }
    .flywheel-phase-desc { font-size: 1.15rem; color: var(--text-dark); line-height: 1.6; font-family: 'Playfair Display', Georgia, serif; font-style: italic; }
    .flywheel-phase-panel.fading .flywheel-phase-desc { animation: centerFade 0.8s ease; }
    .flywheel-progress { display: flex; gap: 24px; margin-top: 32px; padding-top: 24px; border-top: 1px solid rgba(58, 58, 58, 0.1); }
    .flywheel-progress-item { background: none; border: none; padding: 0; font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 500; color: var(--text-light); letter-spacing: 0.05em; cursor: pointer; transition: color 0.4s ease; text-transform: uppercase; }
    .flywheel-progress-item:hover { color: var(--text-medium); }
    .flywheel-progress-item.active { color: var(--terracotta); }
    @media (max-width: 768px) {
      .flywheel-interactive { grid-template-columns: 1fr; gap: 32px; }
      .flywheel-orbit-wrapper { max-width: 260px; }
      .flywheel-phase-panel { text-align: center; align-items: center; min-height: auto; }
      .flywheel-progress { justify-content: center; flex-wrap: wrap; gap: 16px; }
      .flywheel-center-name { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
<div class="framework-card">
  <h3>The Enablement Flywheel</h3>
  <p style="color: var(--text-medium); margin-bottom: 8px;">A four-phase methodology for sustainable technology adoption.</p>
  <div class="flywheel-interactive" id="flywheel">
    <div class="flywheel-orbit-wrapper">
      <svg class="flywheel-orbit-svg" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" role="img">
        <circle class="flywheel-guide-ring" cx="200" cy="200" r="150"/>
        <g class="flywheel-orbit" id="flywheelOrbit">
          <circle class="flywheel-dot-orbit" data-phase="0" cx="200" cy="50" r="16" fill="#E4007C"/>
          <circle class="flywheel-dot-orbit" data-phase="1" cx="350" cy="200" r="8" fill="#CFCDC6"/>
          <circle class="flywheel-dot-orbit" data-phase="2" cx="200" cy="350" r="8" fill="#CFCDC6"/>
          <circle class="flywheel-dot-orbit" data-phase="3" cx="50" cy="200" r="8" fill="#CFCDC6"/>
        </g>
      </svg>
      <div class="flywheel-center" id="flywheelCenter">
        <div class="flywheel-center-label" id="flywheelPhaseLabel">Phase 1</div>
        <div class="flywheel-center-name" id="flywheelPhaseName">Listen</div>
      </div>
    </div>
    <div class="flywheel-phase-panel" id="flywheelPanel" aria-live="polite">
      <div class="flywheel-phase-eyebrow">The Enablement Flywheel</div>
      <div class="flywheel-phase-desc" id="flywheelPhaseDesc">Understand the real barriers, not the assumed ones.</div>
      <div class="flywheel-progress">
        <button class="flywheel-progress-item active" data-jump="0">Listen</button>
        <button class="flywheel-progress-item" data-jump="1">Enable</button>
        <button class="flywheel-progress-item" data-jump="2">Measure</button>
        <button class="flywheel-progress-item" data-jump="3">Amplify</button>
      </div>
    </div>
  </div>
</div>
<script>
(function() {
  const phases = [
    { name: 'Listen',  desc: 'Understand the real barriers, not the assumed ones.' },
    { name: 'Enable',  desc: 'Meet people where they are with relevant training.' },
    { name: 'Measure', desc: 'Track behavior change, not just login counts.' },
    { name: 'Amplify', desc: 'Turn early wins into organizational momentum.' }
  ];
  const orbit = document.getElementById('flywheelOrbit');
  const dots = document.querySelectorAll('.flywheel-dot-orbit');
  const center = document.getElementById('flywheelCenter');
  const panel = document.getElementById('flywheelPanel');
  const nameEl = document.getElementById('flywheelPhaseName');
  const labelEl = document.getElementById('flywheelPhaseLabel');
  const descEl = document.getElementById('flywheelPhaseDesc');
  const progressBtns = document.querySelectorAll('.flywheel-progress-item');
  const container = document.getElementById('flywheel');
  const ACTIVE_COLOR = '#E4007C', INACTIVE_COLOR = '#CFCDC6';
  const ACTIVE_RADIUS = 16, INACTIVE_RADIUS = 8;
  let currentPhase = 0, rotation = 0, timerId = null, isPaused = false;

  function render(index) {
    rotation -= 90;
    orbit.style.transform = 'rotate(' + rotation + 'deg)';
    dots.forEach(dot => {
      const phase = parseInt(dot.dataset.phase, 10);
      if (phase === index) { dot.setAttribute('r', ACTIVE_RADIUS); dot.setAttribute('fill', ACTIVE_COLOR); }
      else { dot.setAttribute('r', INACTIVE_RADIUS); dot.setAttribute('fill', INACTIVE_COLOR); }
    });
    progressBtns.forEach((btn, i) => btn.classList.toggle('active', i === index));
    const phase = phases[index];
    center.classList.remove('fading');
    panel.classList.remove('fading');
    void center.offsetWidth;
    labelEl.textContent = 'Phase ' + (index + 1);
    nameEl.textContent = phase.name;
    descEl.textContent = phase.desc;
    center.classList.add('fading');
    panel.classList.add('fading');
    currentPhase = index;
  }
  function advance() { render((currentPhase + 1) % phases.length); }
  container.addEventListener('mouseenter', () => { isPaused = true; });
  container.addEventListener('mouseleave', () => { isPaused = false; });
  progressBtns.forEach((btn, i) => {
    btn.addEventListener('click', () => {
      if (i === currentPhase) return;
      const diff = i - currentPhase;
      rotation -= (diff - 1) * 90;
      render(i);
    });
  });
  timerId = setInterval(() => { if (!isPaused) advance(); }, 4000);
})();
</script>
</body>
</html>
